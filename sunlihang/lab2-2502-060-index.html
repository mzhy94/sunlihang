<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>春韵-数字展销平台</title>
    <link rel="stylesheet" href="css/lab2-2502-060-index.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="img/logo.png" alt="网站Logo">
        </div>
        <nav class="nav">
            <ul>
                <li><a href="#">首页</a></li>
                <li><a href="#">图书分类</a></li>
                <li><a href="#">新品上市</a></li>
                <li><a href="#">促销活动</a></li>
                <li><a href="#">关于我们</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <aside class="left-sidebar">
            <h3>图书分类</h3>
            <ul>
                <li><a href="#">计算机类</a></li>
                <li><a href="#">文学小说</a></li>
                <li><a href="#">历史传记</a></li>
                <li><a href="#">少儿读物</a></li>
                <li><a href="#">生活百科</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <section class="hot-books">
                <h2>热门图书</h2>
                <div class="book-list">
                    <div class="book-item">
                        <img src="img/book1.jpg" alt="Java从入门到精通">
                        <p>Java从入门到精通</p>
                        <div class="hover-tip">立即购买</div>
                    </div>
                    <div class="book-item">
                        <img src="img/book2.jpg" alt="Python编程实战">
                        <p>Python编程实战</p>
                        <div class="hover-tip">立即购买</div>
                    </div>
                </div>
            </section>

    
            <section class="new-books">
                <h2>新书上架</h2>
                <table>
                    <tr>
                        <th>书名</th>
                        <th>价格</th>
                        <th>出版社</th>
                    </tr>
                    <tr>
                        <td>深度学习入门</td>
                        <td>79.00</td>
                        <td>机械工业出版社</td>
                    </tr>
                    <tr>
                        <td>Web前端开发</td>
                        <td>69.00</td>
                        <td>人民邮电出版社</td>
                    </tr>
                </table>
            </section>
        </main>

        <aside class="right-sidebar">
            <div class="ad-box">
                <img src="img/ad.png" alt="促销广告">
            </div>
        </aside>
    </div>

    <footer class="footer">
        <p> 春韵数字展销平台</p>
    </footer>
</body>
</html>
